<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">


    <meta name="description" content="Entre em contato com a Vinharia Agnello">
    <meta name="keywords" content="vinhos, contato, vinharia, agnello">

    <title>Contato - Vinharia Agnello</title>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body class="body">


    <header class="corpo">
        <h1 class="titulo">VINHARIA AGNELLO</h1>

    <nav>
        <a href="../../index.html">Inicio</a>
        <a href="../pages/historia.html">História</a>
        <a href="src/pages/produtos.html">Vinhos</a>
        <a href="src/pages/equipe.html">Equipe</a>
    </nav>
    </header>

    <main class="corpo">

        <section>
            <h2>Entre em Contato</h2>
            <p>Preencha o formulário abaixo para falar com a nossa equipe.</p>


            <form action="#" method="post">

                <label for="nome">Nome:</label><br>
                <input type="text" id="nome" name="nome" required><br><br>

                <label for="email">E-mail:</label><br>
                <input type="email" id="email" name="email" required><br><br>

                <label for="mensagem">Mensagem:</label><br>
                <textarea id="mensagem" name="mensagem" rows="5" required></textarea><br><br>

                <button type="submit">Enviar</button>

            </form>
        </section>

        <section>
            <h3>Nossa loja</h3>
            <img src="../imgs/vinaaria.jpg" alt="Loja da Vinharia Agnello" width="200">
        </section>

        <section>
            <p>Conheça mais sobre vinhos em 
                <a href="https://pt.wikipedia.org/wiki/Vinho" target="_blank">este artigo</a>.
            </p>
        </section>

    </main>

    <footer>
        <p>&copy; 2026 Vinharia Agnello</p>
    </footer>

    </body>
